LineageOS-20:
  kernel:
    - git clone https://github.com/vivo-devs/kernel_vivo_mt6765.git -b master
  clang:
    - git clone --depth=1 https://gitlab.com/Jprimero15/lolz_clang.git -b main
  config:
    - echo "Checking defconfig..."
  build:
    - if [ -f "arch/arm64/configs/k65v1_64_bsp_defconfig_PD2036F_EX" ]; then echo "Defconfig found!"; else echo "Defconfig NOT found!"; ls arch/arm64/configs/; exit 1; fi && PATH="${PWD}/../clang/bin:${PATH}" make ARCH=arm64 k65v1_64_bsp_defconfig_PD2036F_EX && mkdir -p out && cp .config out/ && PATH="${PWD}/../clang/bin:${PATH}" make -j$(nproc --all) O=out ARCH=arm64 CC=clang CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE="${PWD}/../clang/bin/aarch64-linux-gnu-" CROSS_COMPILE_ARM32="${PWD}/../clang/bin/arm-linux-gnueabi-" LLVM=1 LLVM_IAS=1 LD=ld.lld AR=llvm-ar NM=llvm-nm AS=llvm-as OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip
    - nashc
  kernelSU:
    - stable-pin
    
Clean:
  out:
    - rm -rf out
  kernel:
    - make mrproper
  custom:
    - git status

# Stable-pin version of KernelSU is used by KernelSU.sh to replace placeholder (kernelsu-version) with the newest stable version from ksu_version.txt
KernelSU:
  version:
    stable-pin:
      - curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s legacy
    stable:
      - curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -
    unstable:
      - curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s main

AnyKernel3:
  version:
    nashc:
      - git clone https://github.com/HowWof/AnyKernel3.git -b master
    test:
      - echo "Test Success!"
